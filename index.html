<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div class="container my-5">

    <!-- TASK LIST -->
    <div class="main-box border border-primary p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="fw-bold">Task List</h1>

            <button class="btn btn-primary px-4 py-2">
                <i class="bi bi-plus-lg"></i>
                Add Task
            </button>
        </div>

        <!-- Task 1 -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-3">
            <div class="row align-items-center">

                <div class="col-md-4">
                    <small class="text-secondary">Task</small>
                    <h5>Go to gym</h5>
                </div>

                <div class="col-md-2">
                    <small class="text-secondary">Priority</small>
                    <div class="text-danger fw-bold">High</div>
                </div>

                <div class="col-md-2">
                    <span class="badge bg-light text-secondary">
                        To Do
                    </span>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-circle fs-4 text-secondary"></i>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-pencil-square fs-4"></i>
                </div>

                <div class="col-md-1 text-danger">
                    <i class="bi bi-trash fs-4"></i>
                </div>
            </div>
        </div>

        <!-- Task 2 -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-3">
            <div class="row align-items-center">

                <div class="col-md-4">
                    <small class="text-secondary">Task</small>
                    <h5>Read a book</h5>
                </div>

                <div class="col-md-2">
                    <small class="text-secondary">Priority</small>
                    <div class="text-success fw-bold">Low</div>
                </div>

                <div class="col-md-2">
                    <span class="badge bg-light text-secondary">
                        Done
                    </span>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-circle-fill fs-4 text-primary"></i>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-pencil-square fs-4"></i>
                </div>

                <div class="col-md-1 text-danger">
                    <i class="bi bi-trash fs-4"></i>
                </div>
            </div>
        </div>

        <!-- Task 3 -->
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <div class="row align-items-center">

                <div class="col-md-4">
                    <small class="text-secondary">Task</small>
                    <h5>Go to market</h5>
                </div>

                <div class="col-md-2">
                    <small class="text-secondary">Priority</small>
                    <div class="text-warning fw-bold">Medium</div>
                </div>

                <div class="col-md-2">
                    <span class="badge bg-light text-secondary">
                        In Progress
                    </span>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-circle-half fs-4 text-primary"></i>
                </div>

                <div class="col-md-1">
                    <i class="bi bi-pencil-square fs-4"></i>
                </div>

                <div class="col-md-1 text-danger">
                    <i class="bi bi-trash fs-4"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- ADD TASK -->
    <div class="border border-primary p-4 mt-4">

        <div class="d-flex justify-content-between mb-4">
            <h3>Add Task</h3>
            <i class="bi bi-x-lg fs-4"></i>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">
                Task
            </label>

            <input
                type="text"
                class="form-control"
                placeholder="Type your task here...">
        </div>

        <div class="mb-5">

            <label class="form-label fw-bold d-block">
                Priority
            </label>

            <div class="btn-group" role="group">

                <input type="radio"
                       class="btn-check"
                       name="priority"
                       id="high">

                <label class="btn btn-outline-danger"
                       for="high">
                    High
                </label>

                <input type="radio"
                       class="btn-check"
                       name="priority"
                       id="medium">

                <label class="btn btn-outline-warning"
                       for="medium">
                    Medium
                </label>

                <input type="radio"
                       class="btn-check"
                       name="priority"
                       id="low">

                <label class="btn btn-outline-success"
                       for="low">
                    Low
                </label>
            </div>
        </div>

        <div class="text-end">
            <button class="btn btn-secondary px-4">
                Add
            </button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
